name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check formatting (Black)
        run: black --check .

      - name: Lint (Flake8)
        run: flake8 src tests training scripts

      - name: Run tests
        run: pytest

  validate:
    name: Model Validation
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download test dataset from Roboflow
        env:
          ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
        run: python scripts/download_dataset.py

      - name: Compare challenger vs champion
        run: |
          if [ ! -f models/challenger.pt ]; then
            echo "No challenger model found, skipping validation."
            exit 0
          fi
          DATA_YAML=$(cat .dataset_location)
          python scripts/compare_models.py --data "$DATA_YAML"

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: reports/eval_report.json
          if-no-files-found: ignore
