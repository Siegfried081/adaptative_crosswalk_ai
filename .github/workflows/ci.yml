name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check formatting (Black)
        run: black --check .

      - name: Lint (Flake8)
        run: flake8 src tests training scripts

      - name: Run tests
        run: pytest

  validate:
    name: Model Validation
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download test dataset from Roboflow
        env:
          ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
        run: python scripts/download_dataset.py

      - name: Compare challenger vs champion
        id: compare
        run: |
          if [ ! -f models/challenger.pt ]; then
            echo "No challenger model found, skipping validation."
            echo "has_challenger=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_challenger=true" >> $GITHUB_OUTPUT
          DATA_YAML=$(cat .dataset_location)
          python scripts/compare_models.py --data "$DATA_YAML"

      - name: Promote challenger to champion
        if: steps.compare.outputs.has_challenger == 'true'
        run: |
          cp models/challenger.pt models/champion.pt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/champion.pt
          git commit -m "chore: auto-promote challenger to champion [skip ci]"
          git push

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: reports/eval_report.json
          if-no-files-found: ignore
